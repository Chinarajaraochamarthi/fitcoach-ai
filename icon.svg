<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#080810"/>
  <!-- Orange gradient circle -->
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff8c5a"/>
      <stop offset="100%" stop-color="#cc4a15"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="220" r="140" fill="url(#bg)"/>
  <!-- Dumbbell icon -->
  <rect x="148" y="204" width="216" height="32" rx="16" fill="#fff"/>
  <rect x="136" y="178" width="42" height="84" rx="18" fill="#fff"/>
  <rect x="334" y="178" width="42" height="84" rx="18" fill="#fff"/>
  <rect x="110" y="188" width="38" height="64" rx="16" fill="#fff"/>
  <rect x="364" y="188" width="38" height="64" rx="16" fill="#fff"/>
  <!-- "AI" text below -->
  <text x="256" y="430" font-family="Arial Black, sans-serif" font-size="90" font-weight="900"
        text-anchor="middle" fill="#ff6b35" letter-spacing="4">AI</text>
  <!-- "FITCOACH" small text -->
  <text x="256" y="490" font-family="Arial, sans-serif" font-size="38" font-weight="700"
        text-anchor="middle" fill="#5a5a78" letter-spacing="6">FITCOACH</text>
</svg>
